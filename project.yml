name: Mercury
options:
  bundleIdPrefix: com.hutusi
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SWIFT_APPROACHABLE_CONCURRENCY: YES
targets:
  Mercury:
    type: application
    platform: iOS
    sources: [Mercury]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hutusi.mercury
    info:
      path: Mercury/Support/Info.plist
      properties:
        UILaunchScreen: {}
        APIBaseURL: $(API_BASE_URL)
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
  MercuryTests:
    type: bundle.unit-test
    platform: iOS
    sources: [MercuryTests]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: Mercury
schemes:
  Mercury:
    build:
      targets:
        Mercury: all
    test:
      targets: [MercuryTests]
